name: CI

on:
  push:
    branches: [main, prebuild]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        run: pip install pytest cryptography
      - name: Run tests
        run: pytest -q
