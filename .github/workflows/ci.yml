name: CI

on:
  push:
    branches: [main, prebuild]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        # cryptography → crypto tests; jinja2/leapmotor-api/paho-mqtt let the EVCC, scheduling and
        # climate-render tests actually RUN in CI (they importorskip when these are absent).
        # paho-mqtt>=2.0.0 is quoted so the shell doesn't treat '>' as a redirect.
        run: pip install pytest cryptography jinja2==3.1.4 leapmotor-api==0.3.1 "paho-mqtt>=2.0.0"
      - name: Run tests
        run: pytest -q
