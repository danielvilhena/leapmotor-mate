<div class="card">
  <div class="stat-label">{{ t('avg_efficiency') }}</div>
  <div class="flex items-baseline gap-2">
    {% if eb and eb.avg_kwh100 %}
    <span class="stat-value {% if eb.avg_kwh100 < 18 %}text-green-400{% elif eb.avg_kwh100 < 22 %}text-yellow-400{% else %}text-red-400{% endif %}">
      {{ eff_val(eb.avg_kwh100)|nice }}<span class="text-base font-normal text-slate-400"> {{ eff_unit() }}</span>
    </span>
    {% else %}
    <span class="stat-value text-slate-500">—</span>
    {% endif %}
  </div>
</div>
<div class="card">
  <div class="stat-label">{{ t('energy_used') }}</div>
  <div class="flex items-baseline gap-2">
    {% if eb and eb.total_kwh is not none %}
    <span class="stat-value">{{ eb.total_kwh }}</span><span class="text-slate-400 text-sm">kWh</span>
    {% else %}
    <span class="stat-value text-slate-500">—</span>
    {% endif %}
  </div>
</div>
