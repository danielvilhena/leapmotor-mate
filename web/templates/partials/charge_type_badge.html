{% set ct = charge_types.get(charge.location_type) %}
<div id="charge-type-{{ charge.id }}" class="charge-type-selector">
  <!-- Current type badge + dropdown -->
  <div style="position:relative;display:inline-block">
    {% if ct %}
    <button onclick="document.getElementById('ct-menu-{{ charge.id }}').classList.toggle('hidden')"
            style="background:{{ ct.color }}22;color:{{ ct.color }};border:1px solid {{ ct.color }}55;
                   padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;
                   display:flex;align-items:center;gap:5px">
      {{ ct.icon }} {{ ct.label }} <span style="font-size:9px;opacity:.7">▼</span>
    </button>
    {% else %}
    <button onclick="document.getElementById('ct-menu-{{ charge.id }}').classList.toggle('hidden')"
            style="background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b88;
                   padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;
                   display:flex;align-items:center;gap:5px">
      ❓ {{ t('charge_unconfirmed') }} <span style="font-size:9px;opacity:.7">▼</span>
    </button>
    {% endif %}

    <div id="ct-menu-{{ charge.id }}" class="hidden"
         style="position:absolute;right:0;top:calc(100% + 4px);z-index:50;
                background:#1e293b;border:1px solid #334155;border-radius:10px;
                padding:4px;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.5)">
      {% if not ct %}
      <div style="padding:5px 10px 7px;margin-bottom:3px;font-size:11px;font-weight:700;
                  color:#fbbf24;border-bottom:1px solid #334155">{{ t('charge_confirm_q') }}</div>
      {% endif %}
      {% for key, info in charge_types.items() %}
      <form hx-post="api/charges/{{ charge.id }}/type"
            hx-target="#charge-type-{{ charge.id }}"
            hx-swap="outerHTML"
            style="margin:0">
        <input type="hidden" name="location_type" value="{{ key }}">
        <button type="submit"
                onclick="document.getElementById('ct-menu-{{ charge.id }}').classList.add('hidden')"
                style="width:100%;text-align:left;padding:7px 12px;border-radius:7px;font-size:13px;
                       cursor:pointer;background:{% if charge.location_type == key %}{{ info.color }}22{% else %}transparent{% endif %};
                       color:{{ info.color }};border:none;display:flex;align-items:center;gap:8px">
          {{ info.icon }} {{ info.label }}
          {% if charge.location_type == key %}<span style="margin-left:auto;font-size:10px">✓</span>{% endif %}
        </button>
      </form>
      {% endfor %}
    </div>
  </div>
</div>
{% if cost_oob %}
<!-- The cost changes with the type (and AC-vs-DC basis), so refresh the cost cell out-of-band.
     title surfaces whether it was billed on wallbox AC energy or fell back to battery DC. -->
<div id="cost-{{ charge.id }}" hx-swap-oob="true" style="font-size:16px;font-weight:700"
     class="{% if charge.cost %}text-green-400{% else %}text-slate-600{% endif %}"
     {% if cost_title %}title="{{ cost_title }}"{% endif %}>{{ charge.cost | money }}</div>
{% endif %}
