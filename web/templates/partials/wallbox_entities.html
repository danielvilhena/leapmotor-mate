<div id="wb-picker" class="mt-3">
  <!-- Guidance for when auto-detection comes up empty (a common confusion for non-standard
       wallbox names): point at "Show all" and the detection-keywords field below. -->
  <p class="text-xs text-slate-500 leading-relaxed mb-3">{{ t('wb_picker_help') }}</p>
  <!-- Advanced mode (issue #21): show every sensor/number entity so foreign-language names or a
       generic energy-meter/relay can be mapped. Toggling reloads this whole block. -->
  <label class="flex items-center gap-2 text-xs text-slate-400 mb-3 cursor-pointer">
    <input type="checkbox" class="w-4 h-4 accent-brand" {% if show_all %}checked{% endif %}
           hx-get="api/wallbox/entities{% if not show_all %}?show_all=1{% endif %}"
           hx-target="#wb-picker" hx-swap="outerHTML">
    {{ t('wb_show_all') }}
  </label>
  <form hx-post="api/settings/wallbox-entities" hx-target="#wb-entities-result" hx-swap="innerHTML">
    <!-- One row per role (Telegram feedback): friendly names are long and get truncated in a
         2-column grid, so the distinguishing word (Voltage/Power/Energy…) was cut off. Full-width
         dropdowns + a hover tooltip (on each option AND the closed box) reveal the whole name. -->
    <div class="grid grid-cols-1 gap-3">
    {% for role in roles %}
    <div>
      <label class="block text-xs text-slate-400 mb-1">{{ t('wb_role_' + role) }}</label>
      <select name="{{ role }}"
              onchange="this.title=this.options[this.selectedIndex].title"
              class="w-full px-2.5 py-1.5 rounded-lg bg-slate-800 border border-slate-600 text-white
                     text-xs focus:outline-none focus:border-brand cursor-pointer">
        <option value="">{{ t('wb_none') }}</option>
        {% for e in role_entities[role] %}
        <option value="{{ e.entity_id }}" {% if mapping.get(role) == e.entity_id %}selected{% endif %}
                title="{{ e.name }}{% if e.unit %} ({{ e.unit }}){% endif %} · {{ e.entity_id }}">
          {{ e.name }}{% if e.unit %} ({{ e.unit }}){% endif %}
        </option>
        {% endfor %}
      </select>
      <p class="text-[11px] text-slate-500 leading-snug mt-1">{{ t('wb_role_' + role + '_hint') }}</p>
    </div>
    {% endfor %}
    </div>
    <!-- Seed each closed select's tooltip from its current selection so hovering reveals the full
         mapped entity without opening the dropdown (runs once per htmx swap of this block). -->
    <script>
      document.querySelectorAll('#wb-picker select').forEach(function (s) {
        var o = s.options[s.selectedIndex];
        if (o) s.title = o.title;
      });
    </script>
    <div class="flex items-center justify-between gap-3 pt-3 mt-1">
      <div id="wb-entities-result" class="text-xs"></div>
      <button type="submit"
              class="bg-brand text-white text-sm font-semibold rounded-lg px-4 py-2 flex-shrink-0">
        {{ t('wb_save_entities') }}
      </button>
    </div>
  </form>
</div>
