<div id="wb-picker" class="mt-3">
  <!-- Advanced mode (issue #21): show every sensor/number entity so foreign-language names or a
       generic energy-meter/relay can be mapped. Toggling reloads this whole block. -->
  <label class="flex items-center gap-2 text-xs text-slate-400 mb-3 cursor-pointer">
    <input type="checkbox" class="w-4 h-4 accent-brand" {% if show_all %}checked{% endif %}
           hx-get="api/wallbox/entities{% if not show_all %}?show_all=1{% endif %}"
           hx-target="#wb-picker" hx-swap="outerHTML">
    {{ t('wb_show_all') }}
  </label>
  <form hx-post="api/settings/wallbox-entities" hx-target="#wb-entities-result" hx-swap="innerHTML">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    {% for role in roles %}
    <div>
      <label class="block text-xs text-slate-400 mb-1">{{ t('wb_role_' + role) }}</label>
      <select name="{{ role }}"
              class="w-full px-2.5 py-1.5 rounded-lg bg-slate-800 border border-slate-600 text-white
                     text-xs focus:outline-none focus:border-brand cursor-pointer">
        <option value="">{{ t('wb_none') }}</option>
        {% for e in entities %}
        <option value="{{ e.entity_id }}" {% if mapping.get(role) == e.entity_id %}selected{% endif %}>
          {{ e.name }}{% if e.unit %} ({{ e.unit }}){% endif %}
        </option>
        {% endfor %}
      </select>
    </div>
    {% endfor %}
    </div>
    <div class="flex items-center justify-between gap-3 pt-3 mt-1">
      <div id="wb-entities-result" class="text-xs"></div>
      <button type="submit"
              class="bg-brand text-white text-sm font-semibold rounded-lg px-4 py-2 flex-shrink-0">
        {{ t('wb_save_entities') }}
      </button>
    </div>
  </form>
</div>
