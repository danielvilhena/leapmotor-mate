{% extends "base.html" %}
{% block title %}Commands — LeapMotor Mate{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-white">{{ t('commands_title') }}</h1>
  <p class="text-slate-400 text-sm mt-1">{{ t('commands_subtitle') }}</p>
</div>

{% include "partials/cmd_grid.html" %}

<script>
function refreshCmdGrid() {
  htmx.ajax('GET', 'api/cmd-grid', {target: '#cmd-grid', swap: 'outerHTML'});
}

document.addEventListener('htmx:afterRequest', function(e) {
  var path = (e.detail.pathInfo || {}).requestPath || '';
  if (!e.detail.successful || !path.startsWith('api/command/')) return;
  var resultId = 'result-' + path.split('/').pop();
  var el = document.getElementById(resultId);
  if (el && el.querySelector('[data-warn]')) {
    // The command was refused before sending (e.g. sunshade while driving). Nothing
    // changed on the car, so don't refetch the grid — that would wipe the notice.
    // Leave it up to be read, then clear it.
    setTimeout(function () { var n = document.getElementById(resultId); if (n) n.innerHTML = ''; }, 6000);
    return;
  }
  var slow = el && el.querySelector('[data-slow]');
  if (slow) {
    // Climate/slow commands show a spinner and have no optimistic overlay — leave it
    // up; the first refetch lands once the car has had time to reflect the change.
    setTimeout(refreshCmdGrid, 12000);
    setTimeout(refreshCmdGrid, 20000);
  } else {
    setTimeout(function() {
      var el = document.getElementById(resultId);
      if (el && el.innerHTML.includes('✓')) el.innerHTML = '';
    }, 4000);
    // Instant flip from the optimistic overlay (written before this response), then
    // reconcile against the car as the cloud catches up (matches the backend verify
    // loop's 30s deadline) — GitHub #34.
    setTimeout(refreshCmdGrid, 800);
    setTimeout(refreshCmdGrid, 5000);
    setTimeout(refreshCmdGrid, 15000);
  }
  setTimeout(refreshCmdGrid, 31000);
});
</script>
{% endblock %}
