services:
  leapmotor-mate:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_FROM: python:3.12-slim
    ports:
      - "4000:4000"
    volumes:
      - ./data:/data            # persistent DB only (code is baked into the image)
    environment:
      - DB_PATH=/data/leapmotor_mate.db
      - TZ=Europe/Rome          # local time for the UI (HA passes this automatically to add-ons)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/healthz', timeout=8)"]
      interval: 60s
      timeout: 10s
      start_period: 45s
      retries: 3
